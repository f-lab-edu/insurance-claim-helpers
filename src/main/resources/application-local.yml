spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:insurance_claim_helpers}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:CHANGE_ME}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:CHANGE_ME}