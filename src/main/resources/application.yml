spring:
  # 기본 활성 프로필: 로컬. 운영 배포 시 SPRING_PROFILES_ACTIVE=prod 환경변수로 덮어쓴다.
  # (테스트도 이 기본값을 따라 application-local.yml의 datasource를 사용한다.)
  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

  # 업로드 파일 크기 제한. Spring 기본값(1MB)
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 30MB

  # 세션 저장소를 DB(JDBC)로 사용. 스키마는 Flyway(V9)가 관리하므로 자동 생성은 끈다.
  session:
    jdbc:
      initialize-schema: never

  security:
    oauth2:
      client:
        registration:
          google:                                    # registrationId = "google"
            scope:                                    # 구글에 요청할 정보 범위
              - openid                                #   신원 토큰(id_token) → OIDC
              - email                                 #   이메일
              - profile                               #   이름 등 프로필
            redirect-uri: "{baseUrl}/auth/google/callback"  # 콜백 경로(커스텀)

  ai:
    anthropic:
      chat:
        options:
          model: claude-sonnet-4-6
          max-tokens: 4096
          # 미지정 시 Spring AI 기본값 0.8 적용
          temperature: 0.2
    openai:
      embedding:
        options:
          # text-embedding-3-small: 1536차원
          model: text-embedding-3-small
    vectorstore:
      pgvector:
        dimensions: 1536
        index-type: hnsw
        distance-type: cosine_distance

# 오브젝트 스토리지(S3 호환). 환경 공통값만 — endpoint/자격증명은 프로필별(application-{profile}.yml)에 둔다
aws:
  s3:
    region: ap-northeast-2
    bucket: insurance-policies             # docker/localstack/init-s3.sh 의 버킷과 일치

# 약관 임베딩 비동기 처리 전용 스레드풀.
embedding:
  executor:
    max-concurrent: 5
    queue-capacity: 20

chat:
  rag:
    similarity-threshold: 0.3


