services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: insurance-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: insurance_claim_helpers
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d insurance_claim_helpers"]
      interval: 10s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3
    container_name: insurance-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: ap-northeast-2
    volumes:
      - localstack_data:/var/lib/localstack
      - ./docker/localstack/init-s3.sh:/etc/localstack/init/ready.d/init-s3.sh

volumes:
  postgres_data:
  localstack_data: